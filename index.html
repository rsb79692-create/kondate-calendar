<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>献立カレンダー</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --morning-bg: #fef3c7;
      --morning-fg: #92400e;
      --lunch-bg: #d1fae5;
      --lunch-fg: #065f46;
      --dinner-bg: #ffedd5;
      --dinner-fg: #9a3412;
      --accent: #3b82f6;
      --today-bg: #fffbeb;
      --sun: #ef4444;
      --sat: #3b82f6;
      --radius: 12px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
      background: #f1f5f9;
      max-width: 480px;
      margin: 0 auto;
      min-height: 100vh;
      padding-bottom: 32px;
    }

    /* ── Header ── */
    header {
      background: #fff;
      padding: 14px 16px 10px;
      box-shadow: 0 1px 4px rgba(0,0,0,.08);
      position: sticky;
      top: 0;
      z-index: 200;
    }
    .header-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header-title {
      font-size: 17px;
      font-weight: 700;
      color: #1e293b;
    }
    .sync-badge {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      color: #64748b;
    }
    .sync-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #22c55e;
      flex-shrink: 0;
    }
    .sync-dot.offline { background: #ef4444; }
    .sync-dot.pending { background: #f59e0b; }

    /* ── Calendar nav ── */
    .cal-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px 0;
    }
    .nav-btn {
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      padding: 7px 14px;
      font-size: 16px;
      cursor: pointer;
      color: #475569;
      transition: background .15s;
    }
    .nav-btn:active { background: #e2e8f0; }
    .month-label {
      font-weight: 600;
      font-size: 14px;
      color: #334155;
    }

    /* ── 3-day grid ── */
    .days-wrap {
      padding: 10px 12px 0;
      display: flex;
      gap: 8px;
    }
    .day-card {
      flex: 1;
      background: #fff;
      border-radius: var(--radius);
      padding: 8px 6px;
      cursor: pointer;
      border: 2px solid transparent;
      transition: border-color .15s, transform .1s;
      box-shadow: 0 1px 3px rgba(0,0,0,.07);
      min-width: 0;
    }
    .day-card:active { transform: scale(.97); }
    .day-card.selected { border-color: var(--accent); }
    .day-card.today { background: var(--today-bg); }

    .day-head {
      text-align: center;
      padding-bottom: 6px;
      border-bottom: 1px solid #f0f0f0;
      margin-bottom: 5px;
    }
    .day-num {
      font-size: 22px;
      font-weight: 700;
      line-height: 1.1;
      color: #1e293b;
    }
    .day-name { font-size: 11px; color: #64748b; margin-top: 1px; }
    .today .day-num { color: #d97706; }
    .day-sun .day-num, .day-sun .day-name { color: var(--sun); }
    .day-sat .day-num, .day-sat .day-name { color: var(--sat); }

    .meal-row {
      display: flex;
      align-items: center;
      gap: 4px;
      margin-bottom: 3px;
      border-radius: 6px;
      padding: 3px 5px;
      min-width: 0;
    }
    .meal-row.m { background: var(--morning-bg); }
    .meal-row.l { background: var(--lunch-bg); }
    .meal-row.d { background: var(--dinner-bg); }
    .meal-lbl {
      font-size: 10px;
      font-weight: 700;
      flex-shrink: 0;
    }
    .meal-row.m .meal-lbl { color: var(--morning-fg); }
    .meal-row.l .meal-lbl { color: var(--lunch-fg); }
    .meal-row.d .meal-lbl { color: var(--dinner-fg); }
    .meal-val {
      font-size: 10px;
      color: #374151;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      min-width: 0;
    }
    .meal-val.empty { color: #cbd5e1; }

    /* ── Edit panel ── */
    .edit-panel {
      margin: 10px 12px 0;
      background: #fff;
      border-radius: var(--radius);
      padding: 16px;
      box-shadow: 0 2px 10px rgba(0,0,0,.10);
      display: none;
      animation: slideDown .2s ease;
    }
    .edit-panel.open { display: block; }
    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .panel-title {
      font-size: 15px;
      font-weight: 700;
      color: #1e293b;
      margin-bottom: 14px;
    }

    .field-group { margin-bottom: 10px; }
    .field-label {
      display: flex;
      align-items: center;
      gap: 7px;
      margin-bottom: 5px;
    }
    .badge {
      padding: 2px 9px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 700;
    }
    .badge.m { background: var(--morning-bg); color: var(--morning-fg); }
    .badge.l { background: var(--lunch-bg);   color: var(--lunch-fg); }
    .badge.d { background: var(--dinner-bg);  color: var(--dinner-fg); }

    .meal-input {
      width: 100%;
      padding: 10px 12px;
      border: 1.5px solid #e2e8f0;
      border-radius: 9px;
      font-size: 15px;
      outline: none;
      transition: border-color .2s;
      color: #1e293b;
    }
    .meal-input:focus { border-color: var(--accent); }

    .btn-row { display: flex; gap: 8px; margin-top: 12px; }
    .btn-save {
      flex: 1;
      padding: 12px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: background .15s;
    }
    .btn-save:active { background: #2563eb; }
    .btn-close {
      padding: 12px 16px;
      background: #f1f5f9;
      color: #64748b;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      cursor: pointer;
    }
    .btn-close:active { background: #e2e8f0; }

    /* ── Shopping list ── */
    .section {
      margin: 14px 12px 0;
    }
    .section-head {
      font-size: 15px;
      font-weight: 700;
      color: #1e293b;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .add-row {
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
    }
    .shop-input {
      flex: 1;
      padding: 10px 12px;
      border: 1.5px solid #e2e8f0;
      border-radius: 9px;
      font-size: 15px;
      outline: none;
      color: #1e293b;
    }
    .shop-input:focus { border-color: var(--accent); }
    .btn-add {
      padding: 10px 16px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 9px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }
    .btn-add:active { background: #2563eb; }

    .shop-list {
      background: #fff;
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: 0 1px 3px rgba(0,0,0,.07);
    }
    .shop-item {
      display: flex;
      align-items: center;
      padding: 13px 14px;
      border-bottom: 1px solid #f8fafc;
      gap: 11px;
      transition: background .1s;
    }
    .shop-item:last-child { border-bottom: none; }
    .shop-item.checked .item-name {
      text-decoration: line-through;
      color: #94a3b8;
    }

    .chk-btn {
      width: 23px; height: 23px;
      border-radius: 50%;
      border: 2px solid #cbd5e1;
      background: none;
      cursor: pointer;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      color: transparent;
      transition: all .15s;
    }
    .shop-item.checked .chk-btn {
      background: #10b981;
      border-color: #10b981;
      color: #fff;
    }
    .item-name { flex: 1; font-size: 15px; color: #1e293b; }
    .del-btn {
      background: none;
      border: none;
      color: #cbd5e1;
      font-size: 17px;
      cursor: pointer;
      padding: 4px 6px;
      border-radius: 6px;
      transition: color .15s;
    }
    .del-btn:hover { color: #ef4444; }

    .empty-msg {
      padding: 20px;
      text-align: center;
      color: #94a3b8;
      font-size: 14px;
    }

    /* ── Config notice ── */
    .cfg-notice {
      margin: 10px 12px 0;
      background: #fef3c7;
      border: 1.5px solid #f59e0b;
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 13px;
      color: #78350f;
      line-height: 1.5;
    }
    .cfg-notice code {
      background: #fde68a;
      padding: 1px 5px;
      border-radius: 4px;
      font-family: monospace;
    }
  </style>
</head>
<body>

  <div class="header-row">

<div class="edit-panel" id="editPanel">

  <div class="field-group">

  <div class="field-group">

<div class="section">
  <div class="section-head">🛒 買い物リスト</div>
  <div class="add-row">

  </div>
  <div class="shop-list" id="shopList">
    <div class="empty-msg">読み込み中…</div>

</div>

<!-- Firebase SDK (ES Module) -->
<script type="module">
  import { initializeApp }
    from "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js";
  import {
    getFirestore, enableIndexedDbPersistence,
    doc, setDoc, collection,
    onSnapshot, addDoc, updateDoc, deleteDoc, query, orderBy
  } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js";

  // ─────────────────────────────────────────────
  // Config check
  // ─────────────────────────────────────────────
  const cfg = window.__FIREBASE_CONFIG__;
  const isConfigured = cfg.apiKey !== "YOUR_API_KEY";

  const syncDot  = document.getElementById('syncDot');
  const syncText = document.getElementById('syncText');
  const cfgNotice = document.getElementById('cfgNotice');

  function setSyncStatus(state, msg) {
    syncDot.className = 'sync-dot' + (state !== 'ok' ? ' ' + state : '');
    syncText.textContent = msg;
  }

  // ─────────────────────────────────────────────
  // Firebase init
  // ─────────────────────────────────────────────
  let db = null;
  if (isConfigured) {
    cfgNotice.style.display = 'none';
    try {
      const app = initializeApp(cfg);
      db = getFirestore(app);
      // オフラインキャッシュを有効化
      try { await enableIndexedDbPersistence(db); } catch(e) {}
      setSyncStatus('ok', '同期中');
    } catch (e) {
      console.error(e);
      setSyncStatus('offline', '接続エラー');
    }
  } else {
    setSyncStatus('offline', 'ローカル保存（設定未完了）');
  }

  // ─────────────────────────────────────────────
  // State
  // ─────────────────────────────────────────────
  const DOW = ['日','月','火','水','木','金','土'];
  const MONTHS = [...Array(12)].map((_,i) => `${i+1}月`);

  let baseDate = midnight(new Date());
  let selectedKey = null;
  let mealsCache = {};   // { "YYYY-MM-DD": { morning, lunch, dinner } }
  let shopItems  = [];   // [{ id, name, checked }]

  // ─────────────────────────────────────────────
  // Utilities
  // ─────────────────────────────────────────────
  function midnight(d) {
    const r = new Date(d); r.setHours(0,0,0,0); return r;
  }
  function todayKey() { return toKey(midnight(new Date())); }
  function toKey(d) {
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }
  function addDays(d, n) { const r = new Date(d); r.setDate(r.getDate()+n); return r; }
  function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  // ─────────────────────────────────────────────
  // Calendar render
  // ─────────────────────────────────────────────
  function renderCalendar() {
    const wrap = document.getElementById('daysWrap');
    const tk = todayKey();
    const days = [baseDate, addDays(baseDate,1), addDays(baseDate,2)];

    // Month label
    const ml = days[0].getMonth() !== days[2].getMonth()
      ? `${days[0].getFullYear()}年 ${MONTHS[days[0].getMonth()]} – ${MONTHS[days[2].getMonth()]}`
      : `${days[0].getFullYear()}年 ${MONTHS[days[0].getMonth()]}`;
    document.getElementById('monthLabel').textContent = ml;

    wrap.innerHTML = days.map(d => {
      const k = toKey(d);
      const dow = d.getDay();
      const m = mealsCache[k] || {};
      const cls = [
        'day-card',
        dow===0 ? 'day-sun' : '',
        dow===6 ? 'day-sat' : '',
        k===tk  ? 'today' : '',
        k===selectedKey ? 'selected' : ''
      ].filter(Boolean).join(' ');

      const mealHtml = (type, clsName, lbl, val) => `
        <div class="meal-row ${clsName}">
          <span class="meal-lbl">${lbl}</span>
          <span class="meal-val${val?'':' empty'}">${val ? esc(val) : '─'}</span>
        </div>`;

      return `<div class="${cls}" data-key="${k}">
        <div class="day-head">
          <div class="day-num">${d.getDate()}</div>
          <div class="day-name">${DOW[dow]}</div>
        </div>
        ${mealHtml('morning','m','朝',m.morning||'')}
        ${mealHtml('lunch','l','昼',m.lunch||'')}
        ${mealHtml('dinner','d','夕',m.dinner||'')}
      </div>`;
    }).join('');

    wrap.querySelectorAll('.day-card').forEach(card => {
      card.addEventListener('click', () => onDayClick(card.dataset.key));
    });
  }

  // ─────────────────────────────────────────────
  // Day click → toggle edit panel
  // ─────────────────────────────────────────────
  function onDayClick(key) {
    if (selectedKey === key) {
      selectedKey = null;
      closePanel();
      return;
    }
    selectedKey = key;
    renderCalendar();
    openPanel(key);
  }

  function openPanel(key) {
    const d = new Date(key + 'T00:00:00');
    const m = mealsCache[key] || {};
    document.getElementById('panelTitle').textContent =
      `${d.getMonth()+1}月${d.getDate()}日（${DOW[d.getDay()]}）の献立`;
    document.getElementById('inMorning').value = m.morning || '';
    document.getElementById('inLunch').value   = m.lunch   || '';
    document.getElementById('inDinner').value  = m.dinner  || '';
    const panel = document.getElementById('editPanel');
    panel.classList.add('open');
    panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    document.getElementById('inMorning').focus();
  }

  function closePanel() {
    document.getElementById('editPanel').classList.remove('open');
    renderCalendar();
  }

  // ─────────────────────────────────────────────
  // Save meals
  // ─────────────────────────────────────────────
  async function saveMeals() {
    if (!selectedKey) return;
    const data = {
      morning: document.getElementById('inMorning').value.trim(),
      lunch:   document.getElementById('inLunch').value.trim(),
      dinner:  document.getElementById('inDinner').value.trim(),
      updatedAt: new Date().toISOString()
    };

    if (db) {
      setSyncStatus('pending', '保存中…');
      try {
        await setDoc(doc(db, 'meals', selectedKey), data);
        setSyncStatus('ok', '保存しました ✓');
        setTimeout(() => setSyncStatus('ok', '同期中'), 2000);
      } catch(e) {
        console.error(e);
        setSyncStatus('offline', '保存エラー');
      }
    } else {
      mealsCache[selectedKey] = data;
      localStorage.setItem('meals', JSON.stringify(mealsCache));
      renderCalendar();
    }
    closePanel();
  }

  // ─────────────────────────────────────────────
  // Shopping list render
  // ─────────────────────────────────────────────
  function renderShop() {
    const el = document.getElementById('shopList');
    if (!shopItems.length) {
      el.innerHTML = '<div class="empty-msg">リストは空です</div>';
      return;
    }
    el.innerHTML = shopItems.map(item => `
      <div class="shop-item${item.checked?' checked':''}" data-id="${item.id}">
        <button class="chk-btn" data-id="${item.id}">✓</button>
        <span class="item-name">${esc(item.name)}</span>
        <button class="del-btn" data-del="${item.id}">✕</button>
      </div>`).join('');

    el.querySelectorAll('.chk-btn').forEach(b => b.addEventListener('click', () => toggleShop(b.dataset.id)));
    el.querySelectorAll('.del-btn').forEach(b => b.addEventListener('click', () => deleteShop(b.dataset.del)));
  }

  async function addShop() {
    const input = document.getElementById('shopInput');
    const name = input.value.trim();
    if (!name) return;
    input.value = '';
    if (db) {
      await addDoc(collection(db,'shopping'), { name, checked:false, createdAt: new Date().toISOString() });
    } else {
      shopItems.push({ id: Date.now().toString(), name, checked:false });
      localStorage.setItem('shopping', JSON.stringify(shopItems));
      renderShop();
    }
  }

  async function toggleShop(id) {
    const item = shopItems.find(i=>i.id===id);
    if (!item) return;
    if (db) {
      await updateDoc(doc(db,'shopping',id), { checked: !item.checked });
    } else {
      item.checked = !item.checked;
      localStorage.setItem('shopping', JSON.stringify(shopItems));
      renderShop();
    }
  }

  async function deleteShop(id) {
    if (db) {
      await deleteDoc(doc(db,'shopping',id));
    } else {
      shopItems = shopItems.filter(i=>i.id!==id);
      localStorage.setItem('shopping', JSON.stringify(shopItems));
      renderShop();
    }
  }

  // ─────────────────────────────────────────────
  // Firebase realtime listeners
  // ─────────────────────────────────────────────
  if (db) {
    // Meals
    onSnapshot(collection(db,'meals'), snap => {
      snap.docChanges().forEach(ch => {
        if (ch.type==='removed') delete mealsCache[ch.doc.id];
        else mealsCache[ch.doc.id] = ch.doc.data();
      });
      renderCalendar();
    }, err => {
      console.error(err);
      setSyncStatus('offline','接続エラー');
    });

    // Shopping
    onSnapshot(
      query(collection(db,'shopping'), orderBy('createdAt')),
      snap => {
        shopItems = snap.docs.map(d => ({ id:d.id, ...d.data() }));
        renderShop();
      }
    );
  } else {
    // Local fallback
    try { mealsCache = JSON.parse(localStorage.getItem('meals')||'{}'); } catch(e){}
    try { shopItems  = JSON.parse(localStorage.getItem('shopping')||'[]'); } catch(e){}
    renderCalendar();
    renderShop();
  }

  // ─────────────────────────────────────────────
  // Event wiring
  // ─────────────────────────────────────────────
  document.getElementById('prevBtn').addEventListener('click', () => {
    baseDate = addDays(baseDate,-1); selectedKey=null; closePanel();
  });
  document.getElementById('nextBtn').addEventListener('click', () => {
    baseDate = addDays(baseDate, 1); selectedKey=null; closePanel();
  });
  document.getElementById('saveBtn').addEventListener('click', saveMeals);
  document.getElementById('closeBtn').addEventListener('click', () => {
    selectedKey=null; closePanel();
  });
  document.getElementById('addBtn').addEventListener('click', addShop);
  document.getElementById('shopInput').addEventListener('keypress', e => {
    if (e.key==='Enter') addShop();
  });

  // Enter key chain in edit panel
  document.getElementById('inMorning').addEventListener('keypress', e => {
    if (e.key==='Enter') document.getElementById('inLunch').focus();
  });
  document.getElementById('inLunch').addEventListener('keypress', e => {
    if (e.key==='Enter') document.getElementById('inDinner').focus();
  });
  document.getElementById('inDinner').addEventListener('keypress', e => {
    if (e.key==='Enter') saveMeals();
  });

  // Initial render
  renderCalendar();
</script>
</body>
</html>
