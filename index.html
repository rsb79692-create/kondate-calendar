<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>献立カレンダー</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --m-bg: #fef3c7; --m-fg: #92400e; --m-ring: #fcd34d;
      --l-bg: #d1fae5; --l-fg: #065f46; --l-ring: #6ee7b7;
      --d-bg: #ffedd5; --d-fg: #9a3412; --d-ring: #fdba74;
      --accent: #3b82f6;
      --today-bg: #fffbeb; --today-ring: #fbbf24;
      --sun: #ef4444; --sat: #3b82f6;
      --r: 11px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
      background: #f1f5f9;
      max-width: 480px;
      margin: 0 auto;
      min-height: 100vh;
      padding-bottom: 40px;
    }

    /* ── Header ── */
    header {
      background: #fff;
      padding: 12px 16px 10px;
      box-shadow: 0 1px 4px rgba(0,0,0,.08);
      position: sticky; top: 0; z-index: 200;
      display: flex; align-items: center; justify-content: space-between;
    }
    .header-title { font-size: 17px; font-weight: 700; color: #1e293b; }
    .sync-badge {
      display: flex; align-items: center; gap: 5px;
      font-size: 11px; color: #64748b;
    }
    .sync-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: #22c55e; flex-shrink: 0;
    }
    .sync-dot.offline { background: #ef4444; }
    .sync-dot.pending { background: #f59e0b; }

    /* ── Navigation ── */
    .cal-nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 12px 0;
    }
    .nav-btn {
      background: #fff; border: 1px solid #e2e8f0; border-radius: 8px;
      padding: 7px 14px; font-size: 15px; cursor: pointer; color: #475569;
    }
    .nav-btn:active { background: #e2e8f0; }
    .week-label { font-weight: 600; font-size: 13px; color: #334155; text-align: center; }

    /* ── 2-column grid ── */
    .days-wrap {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      padding: 10px 12px 0;
    }

    /* ── Day card ── */
    .day-card {
      background: #fff;
      border-radius: var(--r);
      border: 1.5px solid transparent;
      box-shadow: 0 1px 3px rgba(0,0,0,.07);
      overflow: hidden;
      min-width: 0;
    }
    /* 7日目はフル幅 */
    .day-card:nth-child(7) { grid-column: span 2; }

    .day-card.today {
      background: var(--today-bg);
      border-color: var(--today-ring);
    }

    /* カードヘッダー */
    .day-head {
      display: flex; align-items: center; gap: 5px;
      padding: 8px 10px 7px;
      border-bottom: 1px solid #f1f5f9;
    }
    .day-date { font-size: 15px; font-weight: 700; color: #1e293b; }
    .day-dow {
      font-size: 11px; font-weight: 600;
      padding: 1px 6px; border-radius: 20px;
      background: #f1f5f9; color: #64748b;
    }
    .day-card.day-sun .day-date,
    .day-card.day-sun .day-dow { color: var(--sun); }
    .day-card.day-sun .day-dow { background: #fee2e2; }
    .day-card.day-sat .day-date,
    .day-card.day-sat .day-dow { color: var(--sat); }
    .day-card.day-sat .day-dow { background: #dbeafe; }

    .today-badge {
      font-size: 10px; font-weight: 700;
      color: #d97706; background: #fef3c7;
      padding: 1px 6px; border-radius: 20px;
    }
    .saved-mark {
      margin-left: auto; font-size: 10px; color: #10b981;
      opacity: 0; transition: opacity .3s; white-space: nowrap;
    }
    .saved-mark.show { opacity: 1; }

    /* ── Meal sections ── */
    .meals { padding: 7px 8px 9px; display: flex; flex-direction: column; gap: 5px; }

    /* 7日目カードはメニューを横並び */
    .day-card:nth-child(7) .meals {
      flex-direction: row;
      gap: 8px;
    }
    .day-card:nth-child(7) .meal-sec {
      flex: 1;
      margin-bottom: 0;
    }

    .meal-sec {
      border-radius: 8px;
      padding: 5px 7px;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }
    .meal-sec.m { background: var(--m-bg); }
    .meal-sec.l { background: var(--l-bg); }
    .meal-sec.d { background: var(--d-bg); }
    .meal-sec.m:focus-within { outline: 1.5px solid var(--m-ring); }
    .meal-sec.l:focus-within { outline: 1.5px solid var(--l-ring); }
    .meal-sec.d:focus-within { outline: 1.5px solid var(--d-ring); }

    .meal-lbl {
      font-size: 11px; font-weight: 700;
      margin-bottom: 1px;
    }
    .meal-sec.m .meal-lbl { color: var(--m-fg); }
    .meal-sec.l .meal-lbl { color: var(--l-fg); }
    .meal-sec.d .meal-lbl { color: var(--d-fg); }

    .meal-in {
      width: 100%;
      border: none; background: transparent;
      font-size: 12px; color: #1e293b;
      outline: none; padding: 2px 0;
      border-bottom: 1px solid rgba(0,0,0,.06);
      min-width: 0;
    }
    .meal-in:last-child { border-bottom: none; }
    .meal-in::placeholder { color: #c4c9d4; font-size: 11px; }
    .meal-in:focus { color: #0f172a; }

    /* ── Shopping list ── */
    .section { margin: 14px 12px 0; }
    .section-head {
      font-size: 15px; font-weight: 700; color: #1e293b;
      margin-bottom: 10px; display: flex; align-items: center; gap: 6px;
    }
    .add-row { display: flex; gap: 8px; margin-bottom: 10px; }
    .shop-input {
      flex: 1; padding: 10px 12px;
      border: 1.5px solid #e2e8f0; border-radius: 9px;
      font-size: 15px; outline: none; color: #1e293b;
    }
    .shop-input:focus { border-color: var(--accent); }
    .btn-add {
      padding: 10px 16px; background: var(--accent);
      color: #fff; border: none; border-radius: 9px;
      font-size: 15px; font-weight: 700; cursor: pointer;
    }
    .btn-add:active { background: #2563eb; }

    .shop-list {
      background: #fff; border-radius: var(--r);
      overflow: hidden; box-shadow: 0 1px 3px rgba(0,0,0,.07);
    }
    .shop-item {
      display: flex; align-items: center;
      padding: 12px 14px; border-bottom: 1px solid #f8fafc; gap: 11px;
    }
    .shop-item:last-child { border-bottom: none; }
    .shop-item.checked .item-name { text-decoration: line-through; color: #94a3b8; }
    .chk-btn {
      width: 23px; height: 23px; border-radius: 50%;
      border: 2px solid #cbd5e1; background: none;
      cursor: pointer; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; color: transparent; transition: all .15s;
    }
    .shop-item.checked .chk-btn { background: #10b981; border-color: #10b981; color: #fff; }
    .item-name { flex: 1; font-size: 15px; color: #1e293b; }
    .del-btn {
      background: none; border: none; color: #cbd5e1;
      font-size: 17px; cursor: pointer; padding: 4px 6px; border-radius: 6px;
    }
    .del-btn:active { color: #ef4444; }
    .empty-msg { padding: 20px; text-align: center; color: #94a3b8; font-size: 14px; }
  </style>
</head>
<body>

<script>
  window.__FIREBASE_CONFIG__ = {
    apiKey:            "AIzaSyCz2iN7xNeuzn9WfmB0TYPrhpzJsGNiUGc",
    authDomain:        "kondate-calendar.firebaseapp.com",
    projectId:         "kondate-calendar",
    storageBucket:     "kondate-calendar.firebasestorage.app",
    messagingSenderId: "341220501687",
    appId:             "1:341220501687:web:be9c39b3c0cca99e498532"
  };
</script>

<header>
  <span class="header-title">🍽 献立カレンダー</span>
  <div class="sync-badge">
    <div class="sync-dot pending" id="syncDot"></div>
    <span id="syncText">起動中…</span>
  </div>
</header>

<div class="cal-nav">
  <button class="nav-btn" id="prevBtn">◀</button>
  <span class="week-label" id="weekLabel"></span>
  <button class="nav-btn" id="nextBtn">▶</button>
</div>

<div class="days-wrap" id="daysWrap"></div>

<div class="section">
  <div class="section-head">🛒 買い物リスト</div>
  <div class="add-row">
    <input class="shop-input" id="shopInput" type="text" placeholder="食材・買い物メモを追加…">
    <button class="btn-add" id="addBtn">追加</button>
  </div>
  <div class="shop-list" id="shopList">
    <div class="empty-msg">読み込み中…</div>
  </div>
</div>

<script type="module">
  import { initializeApp }
    from "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js";
  import {
    getFirestore, enableIndexedDbPersistence,
    doc, setDoc, collection,
    onSnapshot, addDoc, updateDoc, deleteDoc, query, orderBy
  } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js";

  // ── Firebase ──────────────────────────────────
  const cfg = window.__FIREBASE_CONFIG__;
  const isConfigured = cfg.apiKey !== "YOUR_API_KEY";
  const syncDot  = document.getElementById('syncDot');
  const syncText = document.getElementById('syncText');

  function setSyncStatus(state, msg) {
    syncDot.className = 'sync-dot' + (state !== 'ok' ? ' ' + state : '');
    syncText.textContent = msg;
  }

  let db = null;
  if (isConfigured) {
    try {
      const app = initializeApp(cfg);
      db = getFirestore(app);
      try { await enableIndexedDbPersistence(db); } catch(e) {}
      setSyncStatus('ok', '同期中');
    } catch(e) {
      console.error(e);
      setSyncStatus('offline', '接続エラー');
    }
  } else {
    setSyncStatus('offline', 'ローカル保存');
  }

  // ── State ─────────────────────────────────────
  const DOW    = ['日','月','火','水','木','金','土'];
  const MONTHS = [...Array(12)].map((_,i) => `${i+1}月`);

  // mealsCache[key] = { morning, lunch1, lunch2, dinner1, dinner2 }
  let mealsCache = {};
  let shopItems  = [];
  let baseDate   = weekStart(new Date());

  // ── Utilities ─────────────────────────────────
  function midnight(d) { const r = new Date(d); r.setHours(0,0,0,0); return r; }
  function todayKey()  { return toKey(midnight(new Date())); }
  function toKey(d) {
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }
  function addDays(d, n) { const r = new Date(d); r.setDate(r.getDate()+n); return r; }
  function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  function weekStart(d) {
    const r = midnight(d);
    const dow = r.getDay();
    r.setDate(r.getDate() - (dow === 0 ? 6 : dow - 1));
    return r;
  }

  // ── Calendar render ───────────────────────────
  function renderCalendar() {
    const wrap = document.getElementById('daysWrap');
    const tk   = todayKey();
    const days = [...Array(7)].map((_,i) => addDays(baseDate, i));

    // Week label
    const f = days[0], l = days[6];
    document.getElementById('weekLabel').textContent =
      f.getMonth() === l.getMonth()
        ? `${f.getFullYear()}年 ${MONTHS[f.getMonth()]} ${f.getDate()}〜${l.getDate()}日`
        : `${f.getFullYear()}年 ${MONTHS[f.getMonth()]}${f.getDate()}〜${MONTHS[l.getMonth()]}${l.getDate()}`;

    // フォーカス中の input を記録（再描画後に復元）
    const ae = document.activeElement;
    const focusKey  = ae?.dataset?.key  ?? null;
    const focusMeal = ae?.dataset?.meal ?? null;

    wrap.innerHTML = days.map(d => {
      const k   = toKey(d);
      const dow = d.getDay();
      const m   = mealsCache[k] || {};
      const isToday = k === tk;

      const cls = ['day-card',
        dow===0 ? 'day-sun' : '',
        dow===6 ? 'day-sat' : '',
        isToday ? 'today'   : ''
      ].filter(Boolean).join(' ');

      // 入力欄1行
      const inp = (meal, ph) =>
        `<input class="meal-in" type="text"
          data-key="${k}" data-meal="${meal}"
          value="${esc(m[meal]||'')}"
          placeholder="${ph}" autocomplete="off">`;

      return `<div class="${cls}">
        <div class="day-head">
          <span class="day-date">${d.getMonth()+1}/${d.getDate()}</span>
          <span class="day-dow">${DOW[dow]}</span>
          ${isToday ? '<span class="today-badge">今日</span>' : ''}
          <span class="saved-mark" id="sv-${k}">✓</span>
        </div>
        <div class="meals">
          <div class="meal-sec m">
            <span class="meal-lbl">朝</span>
            ${inp('morning','朝食')}
          </div>
          <div class="meal-sec l">
            <span class="meal-lbl">昼</span>
            ${inp('lunch1','昼食①')}
            ${inp('lunch2','昼食②')}
          </div>
          <div class="meal-sec d">
            <span class="meal-lbl">夕</span>
            ${inp('dinner1','夕食①')}
            ${inp('dinner2','夕食②')}
          </div>
        </div>
      </div>`;
    }).join('');

    // イベント登録
    wrap.querySelectorAll('.meal-in').forEach(el => {
      el.addEventListener('blur',    () => onBlur(el));
      el.addEventListener('keydown', e  => { if (e.key==='Enter') { e.preventDefault(); el.blur(); } });
    });

    // フォーカス復元
    if (focusKey && focusMeal) {
      const target = wrap.querySelector(
        `.meal-in[data-key="${focusKey}"][data-meal="${focusMeal}"]`
      );
      if (target) {
        target.focus();
        const len = target.value.length;
        target.setSelectionRange(len, len);
      }
    }
  }

  // ── Auto-save on blur ─────────────────────────
  const saveTimers = {};

  function onBlur(el) {
    const key  = el.dataset.key;
    const meal = el.dataset.meal;
    const val  = el.value.trim();
    if ((mealsCache[key]?.[meal] ?? '') === val) return;
    if (!mealsCache[key]) mealsCache[key] = {};
    mealsCache[key][meal] = val;

    clearTimeout(saveTimers[key]);
    saveTimers[key] = setTimeout(() => saveMeals(key), 300);
  }

  async function saveMeals(key) {
    const m = mealsCache[key] || {};
    const data = {
      morning: m.morning  || '',
      lunch1:  m.lunch1   || '',
      lunch2:  m.lunch2   || '',
      dinner1: m.dinner1  || '',
      dinner2: m.dinner2  || '',
      updatedAt: new Date().toISOString()
    };
    if (db) {
      setSyncStatus('pending', '保存中…');
      try {
        await setDoc(doc(db,'meals',key), data);
        setSyncStatus('ok', '同期中');
        flash(key);
      } catch(e) {
        console.error(e);
        setSyncStatus('offline', '保存エラー');
      }
    } else {
      localStorage.setItem('meals', JSON.stringify(mealsCache));
      flash(key);
    }
  }

  function flash(key) {
    const el = document.getElementById(`sv-${key}`);
    if (!el) return;
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 2000);
  }

  // ── Shopping list ─────────────────────────────
  function renderShop() {
    const el = document.getElementById('shopList');
    if (!shopItems.length) {
      el.innerHTML = '<div class="empty-msg">リストは空です</div>';
      return;
    }
    el.innerHTML = shopItems.map(item => `
      <div class="shop-item${item.checked?' checked':''}">
        <button class="chk-btn" data-id="${item.id}">✓</button>
        <span class="item-name">${esc(item.name)}</span>
        <button class="del-btn" data-del="${item.id}">✕</button>
      </div>`).join('');
    el.querySelectorAll('.chk-btn').forEach(b =>
      b.addEventListener('click', () => toggleShop(b.dataset.id)));
    el.querySelectorAll('.del-btn').forEach(b =>
      b.addEventListener('click', () => deleteShop(b.dataset.del)));
  }

  async function addShop() {
    const input = document.getElementById('shopInput');
    const name  = input.value.trim();
    if (!name) return;
    input.value = '';
    if (db) {
      await addDoc(collection(db,'shopping'),
        { name, checked:false, createdAt: new Date().toISOString() });
    } else {
      shopItems.push({ id: Date.now().toString(), name, checked:false });
      localStorage.setItem('shopping', JSON.stringify(shopItems));
      renderShop();
    }
  }

  async function toggleShop(id) {
    const item = shopItems.find(i => i.id===id);
    if (!item) return;
    if (db) {
      await updateDoc(doc(db,'shopping',id), { checked: !item.checked });
    } else {
      item.checked = !item.checked;
      localStorage.setItem('shopping', JSON.stringify(shopItems));
      renderShop();
    }
  }

  async function deleteShop(id) {
    if (db) {
      await deleteDoc(doc(db,'shopping',id));
    } else {
      shopItems = shopItems.filter(i => i.id!==id);
      localStorage.setItem('shopping', JSON.stringify(shopItems));
      renderShop();
    }
  }

  // ── Firebase listeners ────────────────────────
  if (db) {
    onSnapshot(collection(db,'meals'), snap => {
      snap.docChanges().forEach(ch => {
        if (ch.type==='removed') delete mealsCache[ch.doc.id];
        else mealsCache[ch.doc.id] = ch.doc.data();
      });
      renderCalendar();
    }, err => {
      console.error(err);
      setSyncStatus('offline','接続エラー');
    });

    onSnapshot(
      query(collection(db,'shopping'), orderBy('createdAt')),
      snap => {
        shopItems = snap.docs.map(d => ({ id:d.id, ...d.data() }));
        renderShop();
      }
    );
  } else {
    try { mealsCache = JSON.parse(localStorage.getItem('meals')    || '{}'); } catch(e){}
    try { shopItems  = JSON.parse(localStorage.getItem('shopping') || '[]'); } catch(e){}
    renderCalendar();
    renderShop();
  }

  // ── Navigation ────────────────────────────────
  document.getElementById('prevBtn').addEventListener('click', () => {
    baseDate = addDays(baseDate, -7); renderCalendar();
  });
  document.getElementById('nextBtn').addEventListener('click', () => {
    baseDate = addDays(baseDate,  7); renderCalendar();
  });
  document.getElementById('addBtn').addEventListener('click', addShop);
  document.getElementById('shopInput').addEventListener('keypress', e => {
    if (e.key==='Enter') addShop();
  });

  renderCalendar();
</script>
</body>
</html>
